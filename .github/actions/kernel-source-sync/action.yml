name: 'Download and configure Kernel Source code'

inputs:
  source_location:
    description: 'Folder path to save Kernel source'
    required: true
    type: string
  github_token:
    description: 'GitHub Token'
    required: true
  debug:
    description: 'Enable Logs'
    required: false
    type: boolean
    default: false

runs:
  using: 'composite'
  steps:
    - name: Initialize repo
      shell: bash
      working-directory: ${{ inputs.source_location }}
      run: |
        repo init -u https://github.com/accmon/OnePlus_KernelSU_SUSFS.git \
          -b main \
          -m manifests/oos16/$OP_MANIFEST \
          --depth=1

    - name: Sync source
      shell: bash
      working-directory: ${{ inputs.source_location }}
      run: |
        repo sync -c -j$(nproc)
        repo sync -g ddk -c

    - name: Clean up ABI protected exports
      shell: bash
      working-directory: ${{ inputs.source_location }}/kernel_platform
      run: |
        rm -f common/android/abi_gki_protected_exports_* || true
        rm -f msm-kernel/android/abi_gki_protected_exports_* || true
        sed -i 's/protected_modules = \[.*\]/protected_modules = []/' common/modules.bzl || true
